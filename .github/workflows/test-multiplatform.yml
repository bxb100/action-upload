name: 'webdav test in multiplatform'
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'releases/*'
    paths-ignore:
      - '**.md'

permissions: {}

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          provider: webdav
          # bug: not support create dir in the root of jianguoyun webdav
          provider_options: |
            endpoint=https://dav.jianguoyun.com/dav
            username=${{secrets.webdav_username}}
            password=${{secrets.webdav_password}}
            root=/openDAL/
          include: '__tests__/**'
