name: Oxlint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  oxlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - uses: CatChen/oxlint-suggestion-action@v1
        with:
          request-changes: true # optional
          fail-check: false # optional
